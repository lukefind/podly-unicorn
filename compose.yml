services:
  podly:
    container_name: podly-pure-podcasts
    image: ghcr.io/lukefind/podly-unicorn:latest
    ports:
      - "5001:5001"
    volumes:
      - ./src/instance:/app/src/instance
    env_file:
      - ${PODLY_ENV_FILE:-./.env.local}
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:--1}
      - SERVER_THREADS=${SERVER_THREADS:-4}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: podly-pure-podcasts-network
