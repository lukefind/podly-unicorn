name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: "24"

      - name: Record main before release
        id: release-base
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          npx --yes
          -p semantic-release
          -p @semantic-release/commit-analyzer
          -p @semantic-release/changelog
          -p @semantic-release/git
          -p @semantic-release/github
          -p @semantic-release/release-notes-generator
          semantic-release

      - name: Dispatch container publication for a new release commit
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORIGINAL_SHA: ${{ steps.release-base.outputs.sha }}
        run: |
          set -euo pipefail
          test -n "$ORIGINAL_SHA"
          remote_main=$(git ls-remote origin refs/heads/main | awk '{print $1}')
          test -n "$remote_main"

          if [ "$remote_main" = "$ORIGINAL_SHA" ]; then
            echo "No release commit was created; the original main push remains authoritative."
            exit 0
          fi

          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/docker-publish.yml/dispatches" \
            -f ref=main
          echo "Dispatched container publication for main at $remote_main."
