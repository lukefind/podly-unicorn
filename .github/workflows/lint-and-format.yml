name: Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend pytest
    runs-on: ubuntu-latest
    env:
      PIPENV_VENV_IN_PROJECT: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        id: python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "Pipfile.lock"

      - name: Install ffmpeg
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install pipenv
        run: pip install pipenv

      - name: Cache pipenv virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ steps.python.outputs.python-version }}-${{ hashFiles('Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-venv-${{ steps.python.outputs.python-version }}-

      - name: Install backend dependencies
        run: pipenv install --dev --deploy

      - name: Run backend pytest suite
        run: pipenv run pytest --disable-warnings

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  changed-python-format:
    name: Changed Python format
    runs-on: ubuntu-latest
    env:
      PIPENV_VENV_IN_PROJECT: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed Python files
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            diff_range="origin/${{ github.base_ref }}...${{ github.sha }}"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            diff_range="${{ github.event.before }}...${{ github.sha }}"
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            diff_range="HEAD~1...HEAD"
          else
            first_commit=$(git rev-list --max-parents=0 HEAD | tail -n 1)
            diff_range="${first_commit}...HEAD"
          fi

          files_changed=$(git diff --name-only "$diff_range" || true)
          python_files=$(printf '%s\n' "$files_changed" | grep -E '\.py$' || true)

          {
            echo "python_files<<EOF"
            echo "$python_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: ${{ steps.changed.outputs.python_files != '' }}
        id: python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "Pipfile.lock"

      - name: Install pipenv
        if: ${{ steps.changed.outputs.python_files != '' }}
        run: pip install pipenv

      - name: Cache pipenv virtualenv
        if: ${{ steps.changed.outputs.python_files != '' }}
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ steps.python.outputs.python-version }}-${{ hashFiles('Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-venv-${{ steps.python.outputs.python-version }}-

      - name: Install backend dependencies
        if: ${{ steps.changed.outputs.python_files != '' }}
        run: pipenv install --dev --deploy

      - name: Check changed Python files with black
        if: ${{ steps.changed.outputs.python_files != '' }}
        shell: bash
        run: printf '%s\n' "${{ steps.changed.outputs.python_files }}" | xargs pipenv run black --check

      - name: Check changed Python files with isort
        if: ${{ steps.changed.outputs.python_files != '' }}
        shell: bash
        run: printf '%s\n' "${{ steps.changed.outputs.python_files }}" | xargs pipenv run isort --check-only

      - name: Skip when no Python files changed
        if: ${{ steps.changed.outputs.python_files == '' }}
        run: echo "No Python files changed."

  changed-frontend-eslint:
    name: Changed frontend eslint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed frontend source files
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            diff_range="origin/${{ github.base_ref }}...${{ github.sha }}"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            diff_range="${{ github.event.before }}...${{ github.sha }}"
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            diff_range="HEAD~1...HEAD"
          else
            first_commit=$(git rev-list --max-parents=0 HEAD | tail -n 1)
            diff_range="${first_commit}...HEAD"
          fi

          files_changed=$(git diff --name-only "$diff_range" || true)
          frontend_files=$(printf '%s\n' "$files_changed" | grep -E '^frontend/.*\.(js|jsx|ts|tsx)$' || true)

          {
            echo "frontend_files<<EOF"
            echo "$frontend_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: ${{ steps.changed.outputs.frontend_files != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        if: ${{ steps.changed.outputs.frontend_files != '' }}
        working-directory: frontend
        run: npm ci

      - name: Lint changed frontend files
        if: ${{ steps.changed.outputs.frontend_files != '' }}
        working-directory: frontend
        shell: bash
        run: printf '%s\n' "${{ steps.changed.outputs.frontend_files }}" | sed 's#^frontend/##' | xargs npx eslint

      - name: Skip when no frontend source files changed
        if: ${{ steps.changed.outputs.frontend_files == '' }}
        run: echo "No frontend source files changed."
